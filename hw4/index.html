<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HW4 - Ajax with Pagination & Search</title>
    <style>
        table {
            font-family: Arial, Helvetica, sans-serif;
            border-collapse: collapse;
            width: 100%;
        }
        td, th {
            border: 1px solid #ddd;
            padding: 6px;
        }
        tr:nth-child(even){background-color: #f2f2f2;}
        tr:hover {background-color: #ddd;}
        th {
            padding-top: 12px;
            padding-bottom: 12px;
            text-align: left;
            background-color: #04AA6D;
            color: white;
        }
    </style>
</head>
<body>
    <h1 style="display:inline-block;">景點觀光展覽資訊</h1>
    <input type="text" id="searchInput" placeholder="搜尋名稱..." onchange="searchData()">
    <table id="csie">
        <tr>
            <th>名稱</th>
            <th>地點</th>
            <th>票價</th>
        </tr>
    </table>
    <button onclick="prevPage()">上一頁</button>
    <span id="pageInfo"></span>
    <button onclick="nextPage()">下一頁</button>

    <script>
        var allData = [];
        var filteredData = [];
        var currentPage = 1;
        var pageSize = 10;

        var openUrl =
            "https://cloud.culture.tw/frontsite/trans/SearchShowAction.do?method=doFindTypeJ&category=6";
        var xhr = new XMLHttpRequest();
        xhr.open('GET', openUrl, true);
        xhr.send();
        xhr.onreadystatechange = function(){
            if(this.readyState == 4 && this.status == 200){
                allData = JSON.parse(this.responseText);
                filteredData = allData;
                currentPage = 1;
                renderTable();
            }
        };

        function renderTable() {
            var myTable = document.getElementById("csie");
            // Remove all rows except header
            while (myTable.rows.length > 1) {
                myTable.deleteRow(myTable.rows.length - 1);
            }
            var totalPages = Math.ceil(filteredData.length / pageSize);
            if (totalPages < 1) totalPages = 1;
            if (currentPage > totalPages) currentPage = totalPages;

            var start = (currentPage - 1) * pageSize;
            var end = start + pageSize;
            var pageData = filteredData.slice(start, end);

            pageData.forEach(function(data) {
                var row = myTable.insertRow(-1);
                row.insertCell(0).innerHTML = data['title'];
                var location = '';
                var price = '';
                if (data['showInfo'] && data['showInfo'].length > 0) {
                    location = data['showInfo'][0]['location'] || '';
                    price = data['showInfo'][0]['price'] || '';
                }
                row.insertCell(1).innerHTML = location;
                row.insertCell(2).innerHTML = price;
            });

            document.getElementById("pageInfo").textContent =
                currentPage + " / " + totalPages + " 頁";
        }

        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                renderTable();
            }
        }

        function nextPage() {
            var totalPages = Math.ceil(filteredData.length / pageSize);
            if (currentPage < totalPages) {
                currentPage++;
                renderTable();
            }
        }

        function searchData() {
            var keyword = document.getElementById("searchInput").value;
            if (keyword === '') {
                filteredData = allData;
            } else {
                filteredData = allData.filter(function(data) {
                    return data['title'].indexOf(keyword) !== -1;
                });
            }
            currentPage = 1;
            renderTable();
        }
    </script>
</body>
</html>
